site_name: PongDu
site_description: Official documentation for PuppetAPI and Chzzk Zomboid Donation Mod
site_url: https://t3qquq.github.io/PonDu/

theme:
  name: material
  language: ko

  logo: assets/images/pongdu.ico
  favicon: assets/images/pongdu.ico

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant

    - search.highlight
    - search.suggest
    - search.share

    - content.code.copy
    - content.code.annotate

    - toc.follow
    - navigation.indexes
    - navigation.footer

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 다크 모드

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html

  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - 홈: index.md

  - 시작하기:
      - 시스템 요구사항: getting-started/requirements.md
      - 설치: getting-started/installation.md
      - 최초 실행: getting-started/first-run.md

  - 퐁듀 런처:
      - 개요: pongdu-launcher/overview.md
      - 채널 연동: pongdu-launcher/channel.md
      - rewards.txt 경로: pongdu-launcher/rewards-path.md
      - 리워드 티어: pongdu-launcher/reward-tiers.md
      - PZ 원클릭 최적화: pongdu-launcher/pz-optimization.md
      - 문제 해결: pongdu-launcher/troubleshooting.md

  - 모드 기능 ( API ):
      - 개요: mod-features/overview.md
      - 버프 룰렛 (1,000원): mod-features/buff-roulette.md
      - 디버프 룰렛 (2,000원): mod-features/debuff-roulette.md
      - 좀비 룰렛 (3,000원): mod-features/zombie-roulette.md
      - 백신 (7,000원): mod-features/vaccine.md
      - 스프린터 5마리 (10,000원): mod-features/sprinter5.md
      - 적대 NPC 근접 (20,000원): mod-features/bandit-melee.md
      - 신체 강화 혈청 (30,000원): mod-features/random-skill-potion.md
      - 특수좀비 소환 (40,000원): mod-features/mutant-spawn.md
      - 적대 NPC 원거리 (50,000원): mod-features/bandit-ranged.md
      - 미사일 폭격 (150,000원): mod-features/missile.md
      - 강령술 (200,000원): mod-features/rise-up-dead-man.md

  - FAQ:
      - 자주 묻는 질문: faq/faq.md
      - 알려진 문제: faq/known-issues.md

  - 변경 내역:
      - 릴리즈 노트: changelog/index.md

extra_css:
  - assets/extra.css
